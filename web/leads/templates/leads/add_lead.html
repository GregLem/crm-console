<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить заявку</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        input, textarea, select { margin-bottom: 10px; display: block; width: 300px; padding: 8px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        button:hover { background: #45a049; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Новая заявка</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Отправить</button>
    </form>
    <br>
    <a href="{% url 'lead_list' %}">Назад к списку</a>
</body>
</html>
