{% extends 'base.html' %}

{% block title %}Аналитика | CRM{% endblock %}

{% block extra_css %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2">📊 Аналитика</h1>
    <div>
        <a href="{% url 'export_leads_excel' %}" class="btn btn-success me-2">
            📥 Выгрузить в Excel
        </a>
        <a href="{% url 'kanban_board' %}" class="btn btn-outline-primary">
            📌 Канбан
        </a>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-3">
        <div class="card bg-primary text-white">
            <div class="card-body">
                <h6 class="card-title">Всего заявок</h6>
                <h2 class="mb-0">{{ total_leads }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-success text-white">
            <div class="card-body">
                <h6 class="card-title">Новых сегодня</h6>
                <h2 class="mb-0">{{ new_leads_today }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 mb-4">
        <div class="card">
            <div class="card-header"><h5>Заявки за неделю</h5></div>
            <div class="card-body">
                <canvas id="weeklyChart" height="200"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-4 mb-4">
        <div class="card">
            <div class="card-header"><h5>По статусам</h5></div>
            <div class="card-body">
                <canvas id="statusChart" height="200"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
// График за неделю
const ctx1 = document.getElementById('weeklyChart').getContext('2d');
new Chart(ctx1, {
    type: 'line',
    data: {
        labels: {{ dates|safe }},
        datasets: [{
            label: 'Заявок',
            data: {{ leads_count|safe }},
            borderColor: '#4dabf7',
            backgroundColor: 'rgba(77, 171, 247, 0.1)',
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
    }
});

// Круговая по статусам
const ctx2 = document.getElementById('statusChart').getContext('2d');
new Chart(ctx2, {
    type: 'doughnut',
    data: {
        labels: {{ status_labels|safe }},
        datasets: [{
            data: {{ status_data|safe }},
            backgroundColor: ['#4dabf7','#ffd43b','#69db7c','#da77f2','#ff6b6b','#868e96']
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { position: 'bottom' }
        }
    }
});
</script>
{% endblock %}
