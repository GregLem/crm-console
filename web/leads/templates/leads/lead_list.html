<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список заявок</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .status { font-weight: bold; }
        .status-new { color: blue; }
        .status-in_progress { color: orange; }
        .status-done { color: green; }
        .status-canceled { color: red; }
    </style>
</head>
<body>
    <h1>Все заявки</h1>
    <p><a href="{% url 'add_lead' %}">➕ Добавить заявку</a></p>
     <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Услуга</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody>
            {% for lead in leads %}
            <tr>
                <td>{{ lead.id }}</td>
                <td>{{ lead.created_at|date:"d.m.Y H:i" }}</td>
                <td>{{ lead.name }}</td>
                <td>{{ lead.phone }}</td>
                <td>{{ lead.service }}</td>
                <td class="status status-{{ lead.status }}">
                    {{ lead.get_status_display }}
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6">Заявок пока нет.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
